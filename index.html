<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SellCase — Продавай вигідніше на OLX</title>
  <meta name="description" content="Аналіз цін, моніторинг конкурентів і AI-рекомендації для OLX Ukraine."/>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    html,body { font-family:'Inter',system-ui,-apple-system,sans-serif }
    .grad-bg  { background:linear-gradient(135deg,#2563EB,#7C3AED) }
    .soft     { box-shadow:0 12px 30px rgba(0,0,0,.08) }
    .hero-bg  { background:linear-gradient(135deg,#eff6ff,#fff,#f5f3ff) }
    .lang-btn { padding:.4rem .6rem;border:1px solid #e5e7eb;border-radius:.5rem;font-weight:600;background:#fff;cursor:pointer }
    .lang-btn.active { background:#1d4ed8;color:#fff;border-color:#1d4ed8 }
    .card-hover { transition:transform .2s ease }
    .card-hover:hover { transform:translateY(-3px) }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">

  <!-- Top Banner -->
  <div style="background:#0F172A"
       class="text-white text-center text-sm py-2 px-4 cursor-pointer"
       onclick="document.getElementById('waitlist').scrollIntoView({behavior:'smooth'})">
    🚀 Перші 100 користувачів отримують <strong>Pro безкоштовно на 30 днів</strong>
    → <span class="underline" data-i18n="banner_cta">Отримати доступ</span>
  </div>

  <!-- Header -->
  <header class="sticky top-0 bg-white bg-opacity-90 backdrop-blur border-b border-gray-100 z-40">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2">
        <svg width="28" height="28" viewBox="0 0 64 64" aria-label="SellCase logo">
          <circle cx="32" cy="32" r="28" fill="#2563EB"/>
          <rect x="22" y="36" width="6" height="16" rx="2" fill="#fff"/>
          <rect x="30" y="28" width="6" height="24" rx="2" fill="#fff"/>
          <rect x="38" y="20" width="6" height="32" rx="2" fill="#fff"/>
        </svg>
        <span class="font-bold text-lg text-gray-900">SellCase</span>
      </a>

      <!-- Nav -->
      <nav class="hidden md:flex items-center gap-7 text-sm font-medium text-gray-600">
        <a href="#features" class="hover:text-blue-600" data-i18n="nav_features">Функції</a>
        <a href="#how"      class="hover:text-blue-600" data-i18n="nav_how">Як працює</a>
        <a href="#pricing"  class="hover:text-blue-600" data-i18n="nav_pricing">Тарифи</a>
        <a href="#faq"      class="hover:text-blue-600" data-i18n="nav_faq">FAQ</a>
      </nav>

      <!-- Right side -->
      <div class="flex items-center gap-2">
        <button id="btn-uk" type="button" class="lang-btn active" onclick="setLang('uk')">UA</button>
        <button id="btn-en" type="button" class="lang-btn"        onclick="setLang('en')">EN</button>
        <a href="https://app.sellcase.net/register"
           class="hidden sm:inline-flex items-center px-4 py-2 rounded-lg grad-bg text-white text-sm font-semibold"
           data-i18n="cta_header">Спробувати безкоштовно</a>
      </div>

    </div>
  </header>

</body>
</html>
